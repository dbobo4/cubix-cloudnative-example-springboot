name: Maven Package

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          cache: "maven"

      - name: Check Java version
        run: java -version

      - name: Build with Maven
        run: ./mvnw -B verify

      - name: Publish to GitHub Packages Apache Maven
        run: ./mvnw -B deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}
