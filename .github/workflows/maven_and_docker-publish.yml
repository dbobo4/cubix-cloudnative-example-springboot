name: Maven package publish and Docker image publish

on:
  push:
    branches:
      - main

jobs:
  maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          cache: 'maven'

      - name: Check Java version
        run: java -version

      - name: Build with Maven
        run: ./mvnw -B verify

      - name: Publish to GitHub Packages Apache Maven
        run: ./mvnw -B deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact for Docker job # elmenti a buildelt .jar-t artifactként (“tedd félre a .jar-t a következő jobnak”)
        uses: actions/upload-artifact@v4
        with:
          name: java-app # ez lesz az artifact neve (“így fog rá hivatkozni a Docker job”)
          path: '${{ github.workspace }}/target/*.jar' # a target mappából a .jar-t menti el (“ezt a build eredményt add tovább”)

  docker:
    runs-on: ubuntu-latest
    needs: maven # csak a maven job sikeres lefutása után induljon (“előbb készüljön el a .jar”)
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Download artifact from Maven job # letölti az előző job által elmentett .jar-t (“hozd vissza a Maven által készített artifactot”)
        uses: actions/download-artifact@v4
        with:
          name: java-app # ezt az artifactot keresi (“a java-app nevű .jar csomagot töltsd le”)
          path: . # a workspace gyökerébe teszi le (“ide kerüljön a .jar, hogy a Dockerfile lássa”)

      - name: Logging in to Docker registry # belép a GitHub Container Registry-be (“hitelesítsd magad, hogy tudj image-et pusholni”)
        run: docker login ghcr.io -u dbobo4 -p ${{ github.token }}

      - name: Build the Docker image # Docker image-et épít a letöltött .jar-ból (“csinálj konténer image-et az alkalmazásból”)
        run: docker build . --file Dockerfile --tag ghcr.io/dbobo4/cubix/cloudnative/demo:actions

      - name: Publishing the Docker image # feltolja az image-et a registrybe (“tedd fel a kész Docker image-et a ghcr.io-ra”)
        run: docker push ghcr.io/dbobo4/cubix/cloudnative/demo:actions